<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uidesign</title>
    <script type="module" crossorigin src="/assets/index-VxZF-AbY.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BZauUiKj.css">
  </head>
  <body>
    <div id="root"></div>
    <div id="error-fallback" style="padding:20px;color:#b22626;font-family:sans-serif;font-size:14px;line-height:1.6;word-break:break-all;background:#fff;"></div>
    <script>
      var errors = [];
      window.onerror = function(msg, src, line, col, err) {
        errors.push(msg + ' at line ' + line);
        var el = document.getElementById('error-fallback');
        if (el) { el.textContent = 'JS Error: ' + errors.join(' | '); }
      };
    </script>
  </body>
</html>

services:
  - type: web
    name: uidesign-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: UIDESIGN_CORS_ORIGINS
        value: https://uidesign-delta.vercel.app,https://uidesign-frank561104-7610s-projects.vercel.app
      - key: UIDESIGN_ENABLE_OCR
        value: "true"
      - key: UIDESIGN_ENABLE_GPT
        value: "false"
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
